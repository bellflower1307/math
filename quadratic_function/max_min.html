<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二次関数グラフ探索</title>

  <!-- スタイルシート -->
  <link rel="stylesheet" href="max_min.css" />

  <!-- Chart.js 本体：折れ線・散布図の描画エンジン -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <!-- chartjs-plugin-annotation：グラフ上に補助線（点線）を描くプラグイン -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
  <div class="container">

    <!-- ページタイトルと説明文 -->
    <header>
      <h1>二次関数グラフ探索</h1>
      <p>係数と定義域を入力すると、グラフと最大値・最小値が表示されます</p>
    </header>

    <!-- 入力カード：a・b・c と定義域の両端を入力 -->
    <div class="card">
      <p class="card-title">係数・定義域の入力</p>
      <div class="controls">
        <div class="field">
          <label for="coef-a">係数 a（x²）</label>
          <input type="number" id="coef-a" value="1" step="0.1" />
        </div>
        <div class="field">
          <label for="coef-b">係数 b（x）</label>
          <input type="number" id="coef-b" value="0" step="0.1" />
        </div>
        <div class="field">
          <label for="coef-c">定数 c</label>
          <input type="number" id="coef-c" value="0" step="0.1" />
        </div>
        <div class="field">
          <label for="dom-min">定義域 最小値</label>
          <input type="number" id="dom-min" value="-5" step="0.5" />
        </div>
        <div class="field">
          <label for="dom-max">定義域 最大値</label>
          <input type="number" id="dom-max" value="5" step="0.5" />
        </div>
      </div>
    </div>

    <!-- 結果カード：数式・統計・グラフを表示 -->
    <div class="card">

      <!-- 現在の関数式を文字列で表示（JS が書き換える） -->
      <div class="formula-bar" id="formula-display">f(x) = x²</div>

      <!-- 最小値・最大値・頂点の統計カード（JS が innerHTML で生成） -->
      <div class="stats-grid" id="stats-area"></div>

      <!-- バリデーションエラー表示欄（正常時は空） -->
      <div class="error-msg" id="error-msg"></div>

      <!-- グラフ凡例 -->
      <div class="legend">
        <span class="legend-item"><span class="legend-line"></span>f(x)</span>
        <span class="legend-item"><span class="legend-dot" style="background:#185FA5;border:2px solid #0C447C;"></span>最小値</span>
        <span class="legend-item"><span class="legend-dot" style="background:#E24B4A;border:2px solid #A32D2D;"></span>最大値</span>
        <span class="legend-item"><span class="legend-dot" style="background:#639922;border:2px solid #3B6D11;"></span>頂点</span>
      </div>

      <!-- Chart.js が描画する Canvas 要素 -->
      <div class="chart-wrap">
        <canvas id="qfChart" role="img" aria-label="二次関数のグラフ。最大値・最小値の点をプロットします。"></canvas>
      </div>
    </div>

    <footer>二次関数 f(x) = ax² + bx + c</footer>
  </div>

  <!-- DOM 構築後に実行するため </body> 直前で読み込む -->
  <script src="max_min.js"></script>
   <a href="../index.html">キャビネットへ戻る</a><br>
</body>
</html>
